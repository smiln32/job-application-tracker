<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Application Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header class="hero">
      <div>
        <h1>Job Application Tracker</h1>
        <p>Track applications, interviews, follow-ups, contacts, and notes in one place.</p>
      </div>
      <div class="hero-actions">
        <button id="exportBtn" class="secondary">Export JSON</button>
        <label for="importInput" class="secondary file-label">Import JSON</label>
        <input id="importInput" type="file" accept=".json" hidden />
      </div>
    </header>

    <section class="stats">
      <div class="stat-card">
        <span class="stat-label">Total</span>
        <strong id="totalCount">0</strong>
      </div>
      <div class="stat-card">
        <span class="stat-label">Interviewing</span>
        <strong id="interviewingCount">0</strong>
      </div>
      <div class="stat-card">
        <span class="stat-label">Offers</span>
        <strong id="offerCount">0</strong>
      </div>
      <div class="stat-card">
        <span class="stat-label">Follow-ups Due</span>
        <strong id="followupCount">0</strong>
      </div>
    </section>

    <section class="controls card">
      <div class="control-group">
        <label for="searchInput">Search</label>
        <input id="searchInput" type="text" placeholder="Company or role" />
      </div>
      <div class="control-group">
        <label for="statusFilter">Status</label>
        <select id="statusFilter">
          <option value="All">All</option>
          <option>Applied</option>
          <option>Recruiter Screen</option>
          <option>Interviewing</option>
          <option>Offer</option>
          <option>Rejected</option>
          <option>Withdrawn</option>
        </select>
      </div>
      <div class="control-group grow">
        <label>&nbsp;</label>
        <button id="newBtn">Add Application</button>
      </div>
    </section>

    <section class="content-grid">
      <section class="card form-card">
        <h2 id="formTitle">Add Application</h2>
        <form id="applicationForm">
          <input type="hidden" id="applicationId" />

          <div class="form-grid">
            <div>
              <label for="company">Company</label>
              <input id="company" required />
            </div>
            <div>
              <label for="role">Role</label>
              <input id="role" required />
            </div>
            <div>
              <label for="location">Location</label>
              <input id="location" />
            </div>
            <div>
              <label for="workType">Work Type</label>
              <select id="workType">
                <option value="">Select</option>
                <option>Remote</option>
                <option>Hybrid</option>
                <option>Onsite</option>
              </select>
            </div>
            <div>
              <label for="salary">Salary</label>
              <input id="salary" placeholder="$85,000" />
            </div>
            <div>
              <label for="source">Source</label>
              <input id="source" placeholder="LinkedIn, referral, company site" />
            </div>
            <div>
              <label for="status">Status</label>
              <select id="status" required>
                <option>Applied</option>
                <option>Recruiter Screen</option>
                <option>Interviewing</option>
                <option>Offer</option>
                <option>Rejected</option>
                <option>Withdrawn</option>
              </select>
            </div>
            <div>
              <label for="appliedDate">Applied Date</label>
              <input id="appliedDate" type="date" />
            </div>
            <div>
              <label for="nextInterviewDate">Next Interview Date</label>
              <input id="nextInterviewDate" type="date" />
            </div>
            <div>
              <label for="stage">Interview Stage</label>
              <input id="stage" placeholder="Phone screen, panel, final" />
            </div>
            <div>
              <label for="followupDate">Follow-up Date</label>
              <input id="followupDate" type="date" />
            </div>
            <div>
              <label for="jobUrl">Job URL</label>
              <input id="jobUrl" type="url" placeholder="https://..." />
            </div>
            <div>
              <label for="contactName">Contact Name</label>
              <input id="contactName" />
            </div>
            <div>
              <label for="contactEmail">Contact Email</label>
              <input id="contactEmail" type="email" />
            </div>
          </div>

          <div>
            <label for="notes">Notes</label>
            <textarea id="notes" rows="7" placeholder="Conversation notes, prep points, thank-you sent, next steps..."></textarea>
          </div>

          <div class="form-actions">
            <button type="submit">Save</button>
            <button type="button" id="resetBtn" class="secondary">Clear</button>
          </div>
        </form>
      </section>

      <section class="card list-card">
        <div class="list-header">
          <h2>Applications</h2>
          <span id="resultsCount">0 results</span>
        </div>
        <div id="applicationsList" class="applications-list"></div>
      </section>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
